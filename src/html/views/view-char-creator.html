<main id="view-char-creator" class="app-view">
  <div class="char-creator-workspace">
    <div class="char-creator-header">
      <h2>🧑 捏人工坊</h2>
      <p class="char-creator-subtitle">一句话描述人物特点，AI 为你生成完整的人物档案</p>
    </div>
    <div class="char-input-area">
      <textarea id="char-seed-input" class="seed-textarea" placeholder="例如：一个在废土世界游荡的独眼机械师，表面冷漠但内心温柔..." spellcheck="false"></textarea>
      <button id="btn-gen-character" class="btn btn-primary btn-lg">🎨 AI 捏人</button>
    </div>
    <div id="char-result-area" class="char-result-area" style="display:none">
      <div class="char-card" id="char-card">
        <div class="char-card-header">
          <span class="char-name" id="char-name">—</span>
          <span class="char-badge" id="char-badge">—</span>
        </div>
        <div class="char-card-body" id="char-card-body">
          <!-- AI 生成的人物档案渲染在这里 -->
        </div>
      </div>
      <div class="char-actions">
        <button id="btn-copy-char" class="btn btn-success">📋 复制档案</button>
        <button id="btn-regenerate-char" class="btn btn-secondary">🔄 重新生成</button>
      </div>
    </div>
    <div id="char-empty-state" class="char-empty-state">
      <div class="char-empty-icon">🧑‍🎨</div>
      <p>输入人物特点，点击「AI 捏人」开始创作</p>
    </div>
  </div>
</main>
