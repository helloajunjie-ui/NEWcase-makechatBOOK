<main id="view-library" class="app-view">
  <aside class="lib-sidebar">
    <div class="lib-actions">
      <button id="btn-mount-folder" class="btn btn-secondary btn-full">📂 挂载本地文件夹</button>
      <div id="mount-status" class="mount-status">当前使用：浏览器缓存</div>
    </div>
    <div class="lib-search-box">
      <input type="text" id="lib-search-input" placeholder="搜索剧本标题...">
    </div>
    <div class="lib-list" id="lib-list">
      <!-- 剧本卡片渲染在这里 -->
    </div>
  </aside>

  <section class="lib-detail" id="lib-detail">
    <div class="empty-state">👈 请在左侧选择一个剧本以查看详情</div>
  </section>
</main>
